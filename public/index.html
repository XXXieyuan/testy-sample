<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testy Vent Lab</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="logo-mark">⚡</div>
      <div class="title-block">
        <h1>Testy Vent Lab</h1>
        <p class="subtitle">把情绪写出来，点一下「销毁」，剩下交给熔炉。</p>
      </div>
    </header>

    <main class="layout">
      <section class="panel vent-panel">
        <h2>发泄熔炉</h2>
        <p class="hint">匿名吐槽、碎碎念、胡乱发疯都可以。点击下方「销毁」按钮，看它在霓虹火焰中化为灰烬。</p>

        <div class="vent-box">
          <textarea id="vent-input" maxlength="500" placeholder="今天什么事情最想被销毁？"></textarea>
          <div class="vent-actions">
            <span id="char-counter" class="char-counter">0 / 500</span>
            <button id="destroy-btn" class="destroy-btn">销毁</button>
          </div>
          <div id="destroy-animation" class="destroy-animation" aria-hidden="true"></div>
          <p id="vent-error" class="error-msg" role="alert"></p>
        </div>
      </section>

      <section class="panel leaderboard-panel">
        <div class="leaderboard-header">
          <h2>高能吐槽榜</h2>
          <span class="leaderboard-pill">按点赞数排序</span>
        </div>
        <div id="leaderboard" class="leaderboard-list">
          <div class="empty-state">还没有任何吐槽。成为第一个点燃熔炉的人。</div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>匿名 · 本地存储 · 霓虹实验场</span>
      <span class="dot">·</span>
      <span>原型用途，仅供发泄，不供报仇。</span>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
